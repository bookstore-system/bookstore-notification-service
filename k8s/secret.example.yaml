apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secret
type: Opaque

# Example only. Do not apply this file with real values and do not commit real secrets.
# Jenkinsfile creates/updates this secret from Jenkins Credentials at deploy time.
stringData:
  DB_USERNAME: "[USERNAME]"
  DB_PASSWORD: "[PASSWORD]"
  SPRING_RABBITMQ_PASSWORD: "[RABBITMQ_PASSWORD]"
  SPRING_MAIL_USERNAME: "[MAIL_USERNAME]"
  SPRING_MAIL_PASSWORD: "[MAIL_PASSWORD]"
  NOTIFICATION_MAIL_FROM: "[MAIL_FROM]"
  USER_SERVICE_USERNAME: "[USER_SERVICE_USERNAME]"
  USER_SERVICE_PASSWORD: "[USER_SERVICE_PASSWORD]"
