# Swagger UI (SpringDoc 2.6 + Spring Boot 3.3.x):
#   - Local:  http://localhost:8080/swagger-ui/index.html
#   - Docker: http://localhost:8091/swagger-ui/index.html
# OpenAPI JSON: /v3/api-docs
spring:
  application:
    name: bookstore-notification-service
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

clients:
  user-service:
    # Example: http://user-service:8080 (docker network) or http://localhost:8081 (host)
    url: ${USER_SERVICE_URL:}

# Chỉ dùng khi profile có cấu hình spring.mail.* (vd. `docker` — xem application-docker.yaml)
notification:
  mail:
    from: ${NOTIFICATION_MAIL_FROM:${spring.mail.username:no-reply@localhost}}
  rabbit:
    retry:
      max-attempts: 3
      initial-interval-ms: 2000
      multiplier: 2.0
      max-interval-ms: 10000

logging:
  level:
    root: INFO
    com.notfound.bookstorenotificationservice: DEBUG
    # DevTools in INFO hay in dòng “consider setting logging.level.web…” — chỉnh WARN để console Docker gọn hơn
    org.springframework.boot.devtools.env.DevToolsPropertyDefaultsPostProcessor: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
