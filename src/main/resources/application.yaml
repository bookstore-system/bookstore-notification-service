# Swagger UI (SpringDoc 2.6 + Spring Boot 3.3.x):
#   - Local:  http://localhost:8080/swagger-ui/index.html
#   - Docker: http://localhost:8091/swagger-ui/index.html
# OpenAPI JSON: /v3/api-docs
spring:
  application:
    name: bookstore-notification-service

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

notification:
  promotion:
    retry:
      max-attempts: ${NOTIFICATION_PROMOTION_RETRY_MAX_ATTEMPTS:3}
      initial-interval-ms: ${NOTIFICATION_PROMOTION_RETRY_INITIAL_INTERVAL_MS:2000}
      multiplier: ${NOTIFICATION_PROMOTION_RETRY_MULTIPLIER:2.0}
      max-interval-ms: ${NOTIFICATION_PROMOTION_RETRY_MAX_INTERVAL_MS:10000}

logging:
  level:
    root: INFO
    com.notfound.bookstorenotificationservice: DEBUG
    org.springframework.boot.devtools.env.DevToolsPropertyDefaultsPostProcessor: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
