version: '3.8'

services:
  notification-service:
    image: truongikpk/bookstore-notification-service:v1.0.0
    container_name: notification-service
    ports:
      - "8091:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - bookstore-network

networks:
  bookstore-network:
    external: true
